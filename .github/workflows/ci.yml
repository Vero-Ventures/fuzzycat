name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - name: Lint & Format (Biome)
        run: bun run check
      - name: Type Check
        run: bun run typecheck
      - name: Type Coverage (>=95%)
        run: bun run check:types
      - name: No Direct process.env
        run: bun run scripts/check-process-env.ts
      - name: Circular Dependencies
        run: bun run check:circular
      - name: Unused Code (Knip)
        run: bun run check:unused
      - name: License Compliance
        run: bun run check:licenses
      - name: Extract OpenAPI spec
        run: bun run api:extract
      - name: Lint OpenAPI spec (Spectral)
        run: bun run api:lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - name: Run tests with coverage
        run: |
          count=$(find . -path ./node_modules -prune -o -path ./e2e -prune -o \( -name '*.test.*' -o -name '*.spec.*' \) -print | head -1)
          if [ -n "$count" ]; then
            TURNSTILE_SECRET_KEY='1x0000000000000000000000000000000AA' NEXT_PUBLIC_TURNSTILE_SITE_KEY='1x00000000000000000000AA' bun test lib server app --coverage --coverage-reporter=lcov
          else
            echo "No test files found, skipping."
          fi
      - name: Run proxy tests (isolated — mock.module leaks)
        run: bun test proxy.test.ts --coverage --coverage-reporter=lcov --coverage-dir=coverage-proxy
      - name: Run authorization matrix tests (isolated — mock.module leaks)
        run: bun test authorization-matrix.test.ts --coverage --coverage-reporter=lcov --coverage-dir=coverage-authz
      - name: Run isolated tests (one-per-process — mock.module leaks)
        run: |
          mkdir -p coverage-isolated
          i=0
          for f in tests/isolated/*.test.ts; do
            echo "=== Running $f ==="
            TURNSTILE_SECRET_KEY='1x0000000000000000000000000000000AA' NEXT_PUBLIC_TURNSTILE_SITE_KEY='1x00000000000000000000AA' bun test "$f" --coverage --coverage-reporter=lcov --coverage-dir="coverage-isolated/run-$i" || exit 1
            i=$((i + 1))
          done
      - name: Merge isolated coverage reports
        run: |
          if ls coverage-isolated/*/lcov.info 1>/dev/null 2>&1; then
            cat coverage-isolated/*/lcov.info > coverage-isolated/lcov.info
          fi
      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        if: hashFiles('coverage/lcov.info') != ''
        with:
          files: coverage/lcov.info,coverage-proxy/lcov.info,coverage-authz/lcov.info,coverage-isolated/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - name: Secret Detection (Gitleaks)
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          gitleaks detect --source . --no-banner
      - name: Dependency Audit
        run: |
          npm i --package-lock-only --ignore-scripts
          npm audit --omit=dev 2>&1 || true
          npm audit --audit-level=critical --omit=dev

  semgrep:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:d3d1be3a3770514d16a6a57b9761575d7536d70f45a5220274f4ec7d55c442b9
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: semgrep scan --config auto --error --quiet .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      - name: Bundle Size Budget
        run: bun run check:bundle

  e2e:
    name: E2E Tests (Playwright + Fast)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium
      - name: Run fast tests (HTTP + Cheerio)
        run: bun run test:fast
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          TWILIO_ACCOUNT_SID: ACplaceholder
          TWILIO_AUTH_TOKEN: placeholder
          TWILIO_PHONE_NUMBER: '+10000000000'
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          E2E_TEST_PASSWORD: placeholder_password
          E2E_CLIENT_EMAIL: e2e-client@fuzzycatapp.com
          E2E_CLINIC_EMAIL: e2e-clinic@fuzzycatapp.com
          E2E_ADMIN_EMAIL: e2e-admin@fuzzycatapp.com
      - name: Run E2E tests (CI-safe projects only)
        run: bunx playwright test --project=public
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          TWILIO_ACCOUNT_SID: ACplaceholder
          TWILIO_AUTH_TOKEN: placeholder
          TWILIO_PHONE_NUMBER: '+10000000000'
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          E2E_TEST_PASSWORD: placeholder_password
          E2E_CLIENT_EMAIL: e2e-client@fuzzycatapp.com
          E2E_CLINIC_EMAIL: e2e-clinic@fuzzycatapp.com
          E2E_ADMIN_EMAIL: e2e-admin@fuzzycatapp.com
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  e2e-production:
    name: E2E Production Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium
      - name: Run production E2E tests
        run: bun run test:e2e:prod
        env:
          E2E_ENV: production
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_CLIENT_EMAIL: e2e-owner@fuzzycatapp.com
          E2E_CLINIC_EMAIL: e2e-clinic@fuzzycatapp.com
          NEXT_PUBLIC_SUPABASE_URL: https://wrqwmpptetipbccxzeai.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycXdtcHB0ZXRpcGJjY3h6ZWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzIxMzMsImV4cCI6MjA4NjUwODEzM30.PIDQfwr8RNGq9XxdiXcuM2D3qpJD-jBhrjqkDDpttcs # nosemgrep: generic.secrets.security.detected-jwt-token.detected-jwt-token -- Supabase anon key is public by design
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 14
